<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#72481E"/>
      <stop offset="1" stop-color="#3E2208"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F9F5F0"/>
      <stop offset="1" stop-color="#F2EDE6"/>
    </linearGradient>
  </defs>
  <!-- Fond arrondi (safe-zone respecte les marges iOS/Android maskable 10%) -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Silhouette montagnes en fond -->
  <path d="M 0 340 L 80 220 L 140 270 L 210 170 L 290 240 L 360 180 L 440 230 L 512 200 L 512 512 L 0 512 Z" fill="rgba(255,255,255,0.08)"/>
  <!-- Sapins derriere le chalet -->
  <g fill="#264835" opacity="0.88">
    <polygon points="110,360 140,300 170,360"/>
    <polygon points="115,340 140,290 165,340"/>
    <rect x="135" y="350" width="10" height="18"/>
    <polygon points="372,360 402,300 432,360"/>
    <polygon points="377,340 402,290 427,340"/>
    <rect x="397" y="350" width="10" height="18"/>
  </g>
  <!-- Chalet: structure -->
  <!-- Toit -->
  <polygon points="256,120 132,260 380,260" fill="#3A6648"/>
  <polygon points="256,120 132,260 380,260" fill="none" stroke="#264835" stroke-width="4"/>
  <!-- Cheminee -->
  <rect x="320" y="160" width="34" height="55" fill="#4E2F0D"/>
  <rect x="318" y="152" width="38" height="12" fill="#64503E"/>
  <!-- Murs -->
  <rect x="160" y="260" width="192" height="150" fill="#C07B18"/>
  <rect x="160" y="260" width="192" height="150" fill="none" stroke="#4E2F0D" stroke-width="4"/>
  <!-- Planches horizontales -->
  <g stroke="#8B5A16" stroke-width="2" opacity="0.55">
    <line x1="160" y1="290" x2="352" y2="290"/>
    <line x1="160" y1="320" x2="352" y2="320"/>
    <line x1="160" y1="350" x2="352" y2="350"/>
    <line x1="160" y1="380" x2="352" y2="380"/>
  </g>
  <!-- Porte -->
  <rect x="236" y="335" width="40" height="75" fill="#4E2F0D"/>
  <circle cx="267" cy="375" r="3" fill="#F2EDE6"/>
  <!-- Fenetre gauche -->
  <rect x="180" y="295" width="38" height="38" fill="url(#sky)" stroke="#4E2F0D" stroke-width="3"/>
  <line x1="199" y1="295" x2="199" y2="333" stroke="#4E2F0D" stroke-width="2"/>
  <line x1="180" y1="314" x2="218" y2="314" stroke="#4E2F0D" stroke-width="2"/>
  <!-- Fenetre droite -->
  <rect x="294" y="295" width="38" height="38" fill="url(#sky)" stroke="#4E2F0D" stroke-width="3"/>
  <line x1="313" y1="295" x2="313" y2="333" stroke="#4E2F0D" stroke-width="2"/>
  <line x1="294" y1="314" x2="332" y2="314" stroke="#4E2F0D" stroke-width="2"/>
  <!-- Neige sur le toit -->
  <path d="M 256 120 L 160 228 Q 190 218 220 228 T 280 225 T 340 232 T 380 260 Z" fill="rgba(249, 245, 240, 0.92)"/>
  <!-- Petite fumee -->
  <g fill="rgba(255,255,255,0.55)">
    <circle cx="337" cy="135" r="8"/>
    <circle cx="348" cy="118" r="10"/>
    <circle cx="332" cy="100" r="7"/>
  </g>
</svg>
